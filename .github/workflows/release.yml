name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Scopes CARGO_REGISTRY_TOKEN to this job (not repo-wide) and enforces
    # the environment's deployment-tag policy (v*.*.* only) as a second,
    # independently-configured guard beyond this workflow's own trigger
    # filter above. Same setup kan uses; required-reviewer approval isn't
    # available on kan-tools' current GitHub plan, so the tag policy is the
    # gate.
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # Re-verify before publishing rather than trusting a separate CI run
      # (the tag push also triggers ci.yml, but a publish workflow should be
      # self-contained, not depend on cross-workflow status).
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo fmt --all -- --check

      - name: Verify tag matches Cargo.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME (version $tag_version) does not match Cargo.toml version $cargo_version"
            exit 1
          fi

      - run: cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
